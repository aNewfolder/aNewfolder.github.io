name: ci                            # 工作流名称

on:                                 # 触发条件
  push:                             # 有代码推送时触发
    branches:
      - main                        # 只在 main 分支触发

permissions:                        # 权限配置
  contents: write                   # 允许写入（部署到 gh-pages 分支需要）

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4               # 拉取代码

      - uses: actions/setup-python@v5           # 安装 Python
        with:
          python-version: 3.x

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4                  # 缓存依赖，加速后续构建
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - run: pip install mkdocs-material        # 安装依赖

      - run: mkdocs gh-deploy --force           # 构建并部署到 gh-pages 分支
