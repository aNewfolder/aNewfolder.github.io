# ============================================================
# 自定义 CSS 和 JavaScript
# ============================================================
extra_css:
  - stylesheets/extra.css                  # 自定义样式文件

extra_javascript:
  - javascripts/extra.js                   # 自定义脚本文件

# ============================================================
# Markdown 扩展（增强 Markdown 的功能）
# ============================================================
markdown_extensions:
  - admonition                             # 警告/提示框（如 !!! note）
  - pymdownx.details                       # 可折叠的提示框
  - pymdownx.superfences                   # 增强的代码块
  - pymdownx.tabbed:                       # 选项卡
      alternate_style: true
  - attr_list                              # 给元素添加 HTML 属性（如图片宽度）
  - md_in_html                             # 允许在 HTML 中写 Markdown
  - pymdownx.emoji:                        # Emoji 支持
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:                                   # 目录
      permalink: true                      # 标题旁显示永久链接图标

# ============================================================
# 构建钩子（生成站点统计数据：hooks/site_data.py）
# ============================================================
hooks:
  - hooks/site_data.py                  # 每次构建生成 data/site-stats.json（总字数/更新日历）

# ============================================================
# 插件
# ============================================================
plugins:
  - search                                 # 搜索功能
  - git-revision-date-localized:           # 页面底部显示"最后更新 / 创建于"日期（来自 git 历史）
      enable_creation_date: true           # 同时显示创建日期
      type: datetime                       # 显示日期+时间
      timezone: Asia/Shanghai              # 时区
      locale: zh                           # 中文格式
      fallback_to_build_date: true         # 无 git 历史时回退到构建时间
      exclude:                             # 主页不显示日期
        - index.md

