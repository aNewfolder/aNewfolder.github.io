# ============================================================
# 自定义 CSS 和 JavaScript
# ============================================================
extra_css:
  - stylesheets/extra.css                  # 自定义样式文件

extra_javascript:
  - javascripts/extra.js                   # 自定义脚本文件

# ============================================================
# Markdown 扩展（增强 Markdown 的功能）
# ============================================================
markdown_extensions:
  - admonition                             # 警告/提示框（如 !!! note）
  - pymdownx.details                       # 可折叠的提示框
  - pymdownx.superfences                   # 增强的代码块
  - pymdownx.tabbed:                       # 选项卡
      alternate_style: true
  - attr_list                              # 给元素添加 HTML 属性（如图片宽度）
  - md_in_html                             # 允许在 HTML 中写 Markdown
  - pymdownx.emoji:                        # Emoji 支持
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:                                   # 目录
      permalink: true                      # 标题旁显示永久链接图标

# ============================================================
# 插件
# ============================================================
plugins:
  - search                                 # 搜索功能

